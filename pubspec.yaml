name: footsmart_pro
description: Football gambling and analytics platform - 18+ only
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI Components
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  
  # State Management
  provider: ^6.1.1
  
  # Network
  http: ^1.1.2
  dio: ^5.4.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Image Handling
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  
  # Charts & Graphs
  fl_chart: ^0.66.2
  syncfusion_flutter_charts: ^24.2.4
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  
  # Animation
  lottie: ^3.0.0
  animations: ^2.0.11
  
  # Icons
  flutter_iconpicker: ^3.2.4
  
  # QR Code (for payments)
  qr_flutter: ^4.1.0
  
  # Biometrics
  local_auth: ^2.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
